<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paint Factory Woods — Vivez l'expérience</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --dark:   #06060f;
    --panel:  #0e0d1c;
    --pink:   #e8198b;
    --pink-l: #ff4daf;
    --pink-d: #a0105f;
    --cyan:   #00c8e0;
    --cyan-l: #4de4f5;
    --cyan-d: #008fa0;
    --white:  #f5f3ff;
    --grey:   rgba(245,243,255,.55);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* CURSOR */
  .cursor {
    width: 12px; height: 12px;
    background: var(--pink);
    border-radius: 50%;
    position: fixed; pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: width .2s, height .2s, background .2s;
    mix-blend-mode: exclusion;
  }
  .cursor.big { width: 44px; height: 44px; background: var(--cyan); }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.3rem 3rem;
    background: rgba(6,6,15,.97);
    border-bottom: 1px solid rgba(232,25,139,.12);
    transition: background .3s;
  }
  nav.scrolled { backdrop-filter: blur(18px); }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem; color: var(--pink); text-decoration: none; }
  .nav-logo em { color: var(--cyan); font-style: normal; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { color: var(--white); text-decoration: none; font-size: .78rem; text-transform: uppercase; opacity: .6; }
  .nav-cta { background: linear-gradient(135deg, var(--pink), var(--pink-d)); padding: .5rem 1.5rem; border-radius: 3px; }

  /* TICKER */
  .ticker-wrap { margin-top: 62px; overflow: hidden; background: linear-gradient(90deg, var(--pink-d), var(--pink), var(--cyan-d), var(--cyan), var(--pink-d)); background-size: 300% 100%; animation: gradient-move 8s ease infinite; padding: .65rem 0; position: relative; z-index: 50; }
  .ticker { display: flex; animation: ticker 40s linear infinite; white-space: nowrap; }
  .ticker-item { font-family: 'Bebas Neue', sans-serif; font-size: .9rem; color: #fff; padding: 0 2.5rem; }

  /* HERO */
  .hero { min-height: 100vh; position: relative; display: grid; grid-template-columns: 1fr 1fr; align-items: center; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(ellipse at 75% 45%, rgba(0,200,224,.12), transparent 65%), radial-gradient(ellipse at 25% 55%, rgba(232,25,139,.12), transparent 65%), linear-gradient(160deg, var(--dark) 0%, #0a0917 100%); }
  .hero-content { position: relative; z-index: 2; padding: 6rem 3rem 5rem 6rem; opacity: 0; animation: fadeUp .9s .2s forwards; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 7.5vw, 7.5rem); line-height: .9; }
  .hero-title .line-2 { color: var(--pink); }
  .hero-title .line-3 { -webkit-text-stroke: 2px var(--cyan); color: transparent; }

  /* SPLAT VISUAL */
  .hero-visual { position: relative; z-index: 2; height: 100vh; display: flex; align-items: center; justify-content: center; }
  .splat-container { position: relative; width: 420px; height: 420px; }
  .splat-ring { position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(0,200,224,.18); animation: pulse-ring 3.5s ease-in-out infinite; }
  .splat-core { position: absolute; inset: 55px; background: radial-gradient(circle, var(--cyan-l), var(--cyan-d)); border-radius: 58% 42% 68% 32% / 48% 62% 38% 72%; animation: morph 7s ease-in-out infinite; box-shadow: 0 0 60px rgba(0,200,224,.45); }
  .hero-badge { position: absolute; bottom: -15px; right: -15px; width: 96px; height: 96px; background: var(--pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: rotate-slow 14s linear infinite; font-family: 'Bebas Neue'; color: #fff; }

  /* ACTIVITIES GRID */
  .activities { padding: 8rem 6rem; position: relative; }
  .section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 4rem; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 5vw, 5rem); line-height: .92; }

  .activities-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 4 Colonnes propres */
    gap: 1px;
    background: rgba(245,243,255,.1);
  }

  .activity-card {
    background: var(--dark); padding: 2.5rem 2rem; position: relative; overflow: hidden; min-height: 400px; display: flex; flex-direction: column; justify-content: flex-end; transition: 0.3s;
  }
  .activity-card:hover { background: var(--panel); }
  .activity-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 25%, rgba(6,6,15,.9) 100%); z-index: 1; }
  .color-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 3; }
  .activity-card:nth-child(odd) .color-bar { background: var(--pink); }
  .activity-card:nth-child(even) .color-bar { background: var(--cyan); }

  .activity-icon { position: absolute; top: 2rem; right: 1.8rem; font-size: 2.8rem; z-index: 2; opacity: 0.8; transition: 0.3s; }
  .activity-card:hover .activity-icon { transform: scale(1.2) rotate(-6deg); }
  .activity-bg-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Bebas Neue'; font-size: 8rem; color: rgba(245,243,255,.03); z-index: 0; }

  .activity-content { position: relative; z-index: 2; }
  .activity-tag { display: inline-block; padding: .2rem .75rem; font-size: .6rem; text-transform: uppercase; border-radius: 2px; margin-bottom: 1rem; border: 1px solid currentColor; }
  .activity-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; line-height: 1; margin-bottom: .7rem; }
  .activity-desc { font-size: .8rem; line-height: 1.6; color: var(--grey); margin-bottom: 1.5rem; }
  .activity-link { display: flex; align-items: center; gap: .6rem; text-decoration: none; font-size: .7rem; text-transform: uppercase; font-weight: 500; color: inherit; }
  .activity-link-line { width: 22px; height: 1px; background: currentColor; }

  /* CONTACT FORM */
  .contact { padding: 8rem 6rem; }
  .contact-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; }
  .form-group { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1.2rem; }
