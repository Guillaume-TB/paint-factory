<style>
  :root {
    --dark:   #06060f;
    --panel:  #0e0d1c;
    --pink:   #e8198b;
    --pink-d: #a0105f;

    --grey:   rgba(245,243,255,.55);

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* CURSOR */
  .cursor {
    width: 12px; height: 12px;
    background: var(--pink);
    border-radius: 50%;
    position: fixed; pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: width .2s, height .2s;
    mix-blend-mode: exclusion;
  }
  .cursor.big { width: 44px; height: 44px; background: var(--cyan); }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;

    padding: 1.3rem 3rem;
    background: rgba(6,6,15,.97);
    border-bottom: 1px solid rgba(232,25,139,.12);
    backdrop-filter: blur(18px);
  }

    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.55rem; letter-spacing: .08em;
    color: var(--pink); text-decoration: none; line-height: 1;
  }
  .nav-logo em { color: var(--cyan); font-style: normal; }

  }
  .nav-links a:hover { opacity: 1; color: var(--cyan); }
